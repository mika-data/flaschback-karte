<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLÄSCHBÄCK – MVP: Bodenkachel</title>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        html, body { margin: 0; padding: 0; overflow: hidden; background: #0f172a; }
        #canvas-container { position: absolute; inset: 0; }
        #status {
            position: absolute; top: 12px; left: 12px;
            background: rgba(0,0,0,0.75); color: #34d399;
            font-family: "Consolas", "Courier New", monospace;
            font-size: 12px; line-height: 1.6;
            padding: 12px 14px; border: 1px solid #064e3b; border-radius: 8px;
            white-space: pre;
        }
    </style>
</head>
<body>
    <div id="canvas-container"></div>
    <div id="status">Lade Kachel …</div>

    <script>
        // ====================================================================
        // KONFIGURATION
        // ====================================================================

        // Bezugspunkt der Projektion (Szenen-Ursprung X=0/Z=0): Mittelpunkt der
        // Event-BBox (50.91458768499676,6.958336830139161 .. 50.92179501822431,6.962800025939942)
        const CENTER_LAT = 50.91819135161053;
        const CENTER_LON = 6.960568428039552;

        // Die EINE Kachel für diesen MVP-Schritt (Zoom 19), bereits als
        // mathematisch korrekt für CENTER_LAT/LON verifiziert (floor der
        // gpsToTile()-Berechnung).
        var tile_zoom = 19;
        var tile_x = 272281;
        var tile_y = 175708;
		
		const TILES = [{
							TILE_ZOOM: 19,
							TILE_X: 272281,
							TILE_Y: 175708,
						},
						{
							TILE_ZOOM: 19,
							TILE_X: 272280,
							TILE_Y: 175708,
						}
					];

		console.log(TILES);
		
        const R_EARTH = 6378137; // WGS84 Erdradius in Metern

        // ====================================================================
        // GIS-MATHEMATIK (reine Funktionen, keine Hardcodes/Slider)
        // ====================================================================

        // WGS84 GPS -> Web Mercator (EPSG:3857), absolute Meter
        function gpsToMercator(lat, lon) {
            const x = R_EARTH * lon * Math.PI / 180;
            const latRad = lat * Math.PI / 180;
            const y = R_EARTH * Math.log(Math.tan(Math.PI / 4 + latRad / 2));
            return { x, y };
        }

        // Slippy-Map Kachel-Koordinate -> GPS (liefert die NORDWEST-Ecke der Kachel)
        function tileToGps(xtile, ytile, zoom) {
            const n = Math.pow(2, zoom);
            const lon = xtile / n * 360 - 180;
            const latRad = Math.atan(Math.sinh(Math.PI * (1 - 2 * ytile / n)));
            const lat = latRad * 180 / Math.PI;
            return { lat, lon };
        }

        // GPS -> fraktionale Kachel-Koordinate (Umkehrfunktion, hier nur zur
        // Selbstkontrolle/Status-Anzeige verwendet)
        function gpsToTile(lat, lon, zoom) {
            const n = Math.pow(2, zoom);
            const x = (lon + 180) / 360 * n;
            const latRad = lat * Math.PI / 180;
            const y = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;
            return { x, y };
        }

        // GPS -> Three.js-Szenenkoordinate, relativ zu CENTER_LAT/CENTER_LON
        let projCenterMercator = null;
        function gpsTo3D(lat, lon) {
            if (!projCenterMercator) {
                projCenterMercator = gpsToMercator(CENTER_LAT, CENTER_LON);
            }
            const merc = gpsToMercator(lat, lon);
            const x3D = merc.x - projCenterMercator.x;
            const z3D = -(merc.y - projCenterMercator.y); // Norden = -Z, Süden = +Z
            return { x: x3D, z: z3D };
        }

        // ====================================================================
        // THREE.JS SETUP
        // ====================================================================

        let scene, camera, renderer, controls;

        function initThreeJS() {
            const container = document.getElementById('canvas-container');
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0f172a);

            const aspect = window.innerWidth / window.innerHeight;
            const d = 60;
            camera = new THREE.OrthographicCamera(-d * aspect, d * aspect, d, -d, 1, 1000);
            camera.position.set(50, 60, 50);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            const aspect = window.innerWidth / window.innerHeight;
            camera.left = -60 * aspect;
            camera.right = 60 * aspect;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ====================================================================
        // DIE EINE BODENKACHEL (mathematisch positioniert/skaliert)
        // ====================================================================

        function buildSingleGroundTile() {
            // NW- und SO-Eckpunkt der Kachel in GPS
            const nwGps = tileToGps(TILE_X, TILE_Y, TILE_ZOOM);
            const seGps = tileToGps(TILE_X + 1, TILE_Y + 1, TILE_ZOOM);

            // ... und in Szenenkoordinaten
            const nw = gpsTo3D(nwGps.lat, nwGps.lon);
            const se = gpsTo3D(seGps.lat, seGps.lon);

            const width = Math.abs(se.x - nw.x);
            const height = Math.abs(se.z - nw.z);
            const cx = (nw.x + se.x) / 2;
            const cz = (nw.z + se.z) / 2;

            const tex = new THREE.TextureLoader().load(
                `./osm_tiles/${TILE_ZOOM}/${TILE_X}/${TILE_Y}.png`
            );
            tex.colorSpace = THREE.SRGBColorSpace;

            const geo = new THREE.PlaneGeometry(1, 1);
            const mat = new THREE.MeshBasicMaterial({ map: tex });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.rotation.x = -Math.PI / 2;
            mesh.scale.set(width, height, 1);
            mesh.position.set(cx, 0, cz);
            scene.add(mesh);

            // Eine dünne Bodenlinie/Helfer-Achsenkreuz am Szenenursprung, rein zur
            // visuellen Kontrolle (Ursprung = CENTER_LAT/CENTER_LON)
            const axes = new THREE.AxesHelper(8);
            scene.add(axes);

            // Kamera/Controls auf das TATSÄCHLICHE Kachelzentrum ausrichten, nicht
            // starr auf (0,0,0) – die Kachel liegt ja, korrekt geo-referenziert,
            // versetzt zum BBox-Mittelpunkt (Ursprung).
            camera.position.set(cx + 50, 60, cz + 50);
            camera.lookAt(cx, 0, cz);
            controls.target.set(cx, 0, cz);
            controls.update();

            updateStatus({ nwGps, seGps, nw, se, width, height, cx, cz });
        }


        // ====================================================================
        // MEHRERE BODENKACHELN (mathematisch positioniert/skaliert)
        // ====================================================================

        function buildArrayGroundTiles() {
			var cx = 0.0;
			var cz = 0.0;
			
			var nwGps = 0;
			var seGps = 0;
			
			var nw = 0;
			var se = 0;
			
			var width = 0;
			var height = 0;
			
			for (i=0; i<TILES.length; i++) {
				console.log("running through iteration "+i);
				tile_x = TILES[i].TILE_X;
				tile_y = TILES[i].TILE_Y;
				tile_zoom = TILES[i].TILE_ZOOM;
				
				// NW- und SO-Eckpunkt der Kachel in GPS
				nwGps = tileToGps(tile_x, tile_y, tile_zoom);
				seGps = tileToGps(tile_x + 1, tile_y + 1, tile_zoom);

				// ... und in Szenenkoordinaten
				nw = gpsTo3D(nwGps.lat, nwGps.lon);
				se = gpsTo3D(seGps.lat, seGps.lon);

				width = Math.abs(se.x - nw.x);
				height = Math.abs(se.z - nw.z);
				cx = (nw.x + se.x) / 2;
				cz = (nw.z + se.z) / 2;

				const tex = new THREE.TextureLoader().load(
					`./osm_tiles/${tile_zoom}/${tile_x}/${tile_y}.png`
				);
				tex.colorSpace = THREE.SRGBColorSpace;

				const geo = new THREE.PlaneGeometry(1, 1);
				const mat = new THREE.MeshBasicMaterial({ map: tex });
				const mesh = new THREE.Mesh(geo, mat);
				mesh.rotation.x = -Math.PI / 2;
				mesh.scale.set(width, height, 1);
				mesh.position.set(cx, 0, cz);

				scene.add(mesh);
			}
            // Eine dünne Bodenlinie/Helfer-Achsenkreuz am Szenenursprung, rein zur
            // visuellen Kontrolle (Ursprung = CENTER_LAT/CENTER_LON)
            const axes = new THREE.AxesHelper(8);
            scene.add(axes);

            // Kamera/Controls auf das TATSÄCHLICHE Kachelzentrum ausrichten, nicht
            // starr auf (0,0,0) – die Kachel liegt ja, korrekt geo-referenziert,
            // versetzt zum BBox-Mittelpunkt (Ursprung).
            camera.position.set(cx + 50, 60, cz + 50);
            camera.lookAt(cx, 0, cz);
            controls.target.set(cx, 0, cz);
            controls.update();

            updateStatus({ nwGps, seGps, nw, se, width, height, cx, cz });
        }
		
        function updateStatus(info) {
            const el = document.getElementById('status');
            el.innerText =
`KACHEL: z=${tile_zoom}  x=${tile_x}  y=${tile_y}
NW-Ecke GPS: ${info.nwGps.lat.toFixed(6)}, ${info.nwGps.lon.toFixed(6)}
SO-Ecke GPS: ${info.seGps.lat.toFixed(6)}, ${info.seGps.lon.toFixed(6)}
Breite/Höhe (Szene): ${info.width.toFixed(3)} m / ${info.height.toFixed(3)} m
Zentrum (Szene): X=${info.cx.toFixed(3)}  Z=${info.cz.toFixed(3)}
Ursprung (X=0,Z=0) = ${CENTER_LAT.toFixed(6)}, ${CENTER_LON.toFixed(6)}`;
        }

        // ====================================================================
        // INIT & RENDER-LOOP
        // ====================================================================

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        window.addEventListener('load', () => {
            initThreeJS();
            buildArrayGroundTiles();
            animate();
        });
    </script>
</body>
</html>
